name: CI - Lint and Test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # Job 1: Linting and Formatting (Runs once on Python 3.13)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Run Ruff Linter
        run: uv run ruff check --output-format=github

      - name: Run Ruff Formatter
        run: uv run ruff format --check

  # Job 2: Multi-version Testing Matrix (Runs 3.11, 3.12, and 3.13 concurrently)
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync Dependencies
        run: uv sync

      - name: Run Tests with Pytest
        env:
          # Securely passes your GitHub Actions Secrets to the test environment
          GITHUB_PAT: ${{ secrets.TEST_GITHUB_PAT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run pytest